name: 每日更新台股資料並部署 Pages

# 觸發時機：
#  1. 排程：台股 13:30 收盤、FinMind 盤後資料約 18:00 齊全。
#     GitHub Actions 的 cron 用 UTC → 台灣 18:00 = UTC 10:00，週一至週五。
#     （GitHub 排程在尖峰時可能延遲數分鐘，對每日資料無妨。）
#  2. workflow_dispatch：可在 Actions 分頁手動「Run workflow」立即更新。
on:
  schedule:
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

# deploy-pages 需要的權限：寫 Pages + OIDC 驗證。
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只跑一個部署，避免兩次排程互相覆蓋。
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 取出原始碼
        uses: actions/checkout@v4

      - name: 安裝 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安裝相依套件（fetch 只需 requests）
        run: pip install requests

      - name: 抓取 FinMind 並計算策略
        # token 由 GitHub Secret 注入（絕不寫進 repo）。
        # 雲端 runner 沒有 data/raw 快取 → 會完整抓 35 個交易日 × 4 dataset（約 140 次請求、~5 分鐘）。
        env:
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: python fetch_and_compute.py --days 35 --refresh-latest 2

      - name: 組裝 Pages 發佈目錄（index.html + data 快照）
        # 只放前端與 serving 子集，不含 raw/（太大）。
        run: |
          mkdir -p _site/data
          cp index.html _site/
          touch _site/.nojekyll
          cp data/stocks.json data/market.json data/universe.json _site/data/
          cp -r data/details _site/data/details
          echo "發佈檔案數：$(find _site -type f | wc -l)"

      - name: 設定 Pages
        uses: actions/configure-pages@v5

      - name: 上傳 Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
